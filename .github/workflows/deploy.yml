# 统一的 GitHub Actions 部署工作流
# 合并了 deploy.yml 和 static.yml，并添加了安全检查

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 验证作业 - 确保代码质量
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. HTML 结构验证
      - name: Validate HTML
        run: |
          echo "检查 HTML 文件..."
          if [ ! -f "index.html" ]; then
            echo "❌ index.html 不存在"
            exit 1
          fi
          for tag in "<!DOCTYPE html>" "<html" "<head" "<body" "</html>"; do
            if grep -q "$tag" index.html; then
              echo "✅ 找到 $tag"
            else
              echo "❌ 缺少 $tag"
              exit 1
            fi
          done

      # 2. 安全检查 - 禁止 CONFIG 占位符
      - name: Check for CONFIG placeholders
        run: |
          echo "🔒 检查 CONFIG 占位符..."
          if grep -r "CONFIG\." --include="*.html" --include="*.js" . 2>/dev/null | grep -v "node_modules" | grep -v ".git"; then
            echo "❌ 发现未替换的 CONFIG 占位符！"
            grep -r "CONFIG\." --include="*.html" --include="*.js" . 2>/dev/null | grep -v "node_modules" | grep -v ".git"
            exit 1
          fi
          echo "✅ 无 CONFIG 占位符"

      # 3. 安全检查 - 禁止示例密钥
      - name: Check for example credentials
        run: |
          echo "🔒 检查示例凭证..."
          # 检查 Sentry DSN 示例
          if grep -q "example@sentry.io" --include="*.html" --include="*.js" . 2>/dev/null; then
            echo "⚠️ 发现 Sentry 示例 DSN"
          fi
          # 检查 Webhook 示例
          if grep -q "webhook.site/YOUR-" --include="*.js" . 2>/dev/null; then
            echo "⚠️ 发现示例 Webhook URL"
          fi
          echo "✅ 凭证检查完成"

      # 4. 敏感信息扫描
      - name: Scan for secrets
        run: |
          echo "🔒 扫描敏感信息..."
          # 检查常见敏感词
          if grep -ri "password\|secret\|api[_-]key\|token" --include="*.js" --include="*.html" . 2>/dev/null | grep -v "// " | grep -v "node_modules" | grep -v ".git"; then
            echo "⚠️ 发现可能的敏感信息，请检查"
          else
            echo "✅ 无明显敏感信息泄露"
          fi

      # 5. 必要文件检查
      - name: Check required files
        run: |
          echo "检查必要文件..."
          required_files=("index.html" "data/content.js")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file 存在"
            else
              echo "❌ $file 缺失"
              exit 1
            fi
          done

  # 部署作业
  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: none

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5