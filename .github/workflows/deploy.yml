name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 验证作业
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "检查 HTML 文件..."
          if [ ! -f "index.html" ]; then
            echo "❌ index.html 不存在"
            exit 1
          fi
          if grep -q "<!DOCTYPE html>" index.html; then
            echo "✅ HTML 结构正确"
          else
            echo "❌ HTML 结构缺失"
            exit 1
          fi
          for tag in "<html" "<head" "<body" "</html>"; do
            if grep -q "$tag" index.html; then
              echo "✅ 找到 $tag"
            else
              echo "❌ 缺少 $tag"
              exit 1
            fi
          done

      - name: Validate CSS
        run: |
          echo "检查 CSS 文件..."
          if [ ! -f "css/main.css" ]; then
            echo "⚠️ css/main.css 不存在，跳过"
          else
            echo "✅ CSS 模块存在"
          fi
          if [ -f "styles.css" ]; then
            echo "✅ 旧版 styles.css 存在(兼容)"
          fi

      - name: Check required files
        run: |
          echo "检查必要文件..."
          required_files=("index.html" "data/content.js")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file 存在"
            else
              echo "❌ $file 缺失"
              exit 1
            fi
          done

  # 部署作业
  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 失败通知
  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify failure
        run: |
          echo "⚠️ 部署失败"
          echo "失败的 Job: ${{ github.job }}"
          echo "提交: ${{ github.sha }}"