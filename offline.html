<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线中 - 广西旅游达人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .offline-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 700;
        }
        
        .offline-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .offline-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .offline-tips {
            margin-top: 30px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: left;
        }
        
        .offline-tips h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .offline-tips ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .offline-tips li {
            font-size: 13px;
            color: #666;
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }
        
        .offline-tips li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #667eea;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn.loading .loading-spinner {
            display: inline-block;
        }
        
        .btn.loading .btn-text {
            display: none;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1 class="offline-title">网络暂时离线</h1>
        <p class="offline-desc">
            抱歉，您的设备当前处于离线状态。<br>
            请检查网络连接后重试。
        </p>
        
        <div class="offline-actions">
            <button class="btn btn-primary" onclick="retryConnection()">
                <span class="loading-spinner"></span>
                <span class="btn-text">🔄 重新加载</span>
            </button>
            <a href="/" class="btn btn-secondary">
                🏠 返回首页
            </a>
        </div>
        
        <div class="offline-tips">
            <h4>💡 温馨提示</h4>
            <ul>
                <li>检查 Wi-Fi 或移动数据是否已开启</li>
                <li>尝试切换到其他网络环境</li>
                <li>部分已浏览过的页面可离线查看</li>
                <li>如需紧急咨询，请拨打电话：CONFIG.phone</li>
            </ul>
        </div>
    </div>
    
        <script src="js/config.js"></script>
    <script>
        // 检查网络状态
        function checkOnlineStatus() {
            if (navigator.onLine) {
                // 如果有网络，尝试返回首页
                window.location.href = '/';
            }
        }
        
        // 监听网络状态变化
        window.addEventListener('online', () => {
            console.log('[Offline] 网络已恢复，即将返回首页...');
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        });
        
        window.addEventListener('offline', () => {
            console.log('[Offline] 网络已断开');
        });
        
        // 重新加载
        function retryConnection() {
            const btn = document.querySelector('.btn-primary');
            btn.classList.add('loading');
            
            // 显示加载状态
            setTimeout(() => {
                if (navigator.onLine) {
                    window.location.reload();
                } else {
                    btn.classList.remove('loading');
                    // 短暂震动提示
                    if (navigator.vibrate) {
                        navigator.vibrate(200);
                    }
                    alert('网络仍不可用，请检查网络设置');
                }
            }, 1500);
        }
        
        // 页面加载时检查网络
        document.addEventListener('DOMContentLoaded', () => {
            checkOnlineStatus();
        });
    </script>
</body>
</html>
